spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true

      routes:
        - id: main_service_route
          uri: lb://main-service
          predicates:
            - Path=/admin/**,/users/**,/events/**,/categories/**,/compilations/**
        - id: stats_server_route
          uri: lb://stats-server
          predicates:
            - Path=/hit,/stats/**


server:
  port: 8080